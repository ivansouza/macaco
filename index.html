<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Consul, The Educated Monkey</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div id="sim">
  <div id="header">
    <h1>🐵 Consul, The Educated Monkey</h1>
    <p>Arraste os pés do macaco</p>
    <div id="coords" style="font-size:11px;color:#666;margin-top:2px;font-family:monospace;"></div>
  </div>
  <div id="canvas-wrap">
    <div data-htmler-blocks="" style="transform-origin:left top;position:absolute;top:0;left:0;width:1050px;height:900px;pointer-events:none;">
      <div class="slider" id="slider-left" style="left:264px;top:772px;"><div class="slider-handle"></div></div>
      <div class="slider" id="slider-right" style="left:264px;top:772px;"><div class="slider-handle"></div></div>
    </div>
  </div>
  <div id="controls">
    <button id="btn-op">×</button>
    <button id="btn-reset" disabled>↺</button>
  </div>
  <div id="footer">Consul, the Educated Monkey &mdash; 1916 William Henry Robertson</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
<script>
// Carregar SVG externo e injetar inline
fetch('assets/monkey.svg')
  .then(function(r) { return r.text(); })
  .then(function(svgText) {
    var wrap = document.getElementById('canvas-wrap');
    var parser = new DOMParser();
    var doc = parser.parseFromString(svgText, 'image/svg+xml');
    var svg = doc.documentElement;
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');
    svg.style.display = 'block';
    wrap.insertBefore(svg, wrap.firstChild);
    
    // Inicializar script principal
    var s = document.createElement('script');
    s.src = 'assets/js/script.js';
    document.body.appendChild(s);
  });
</script>
</body>
</html>
